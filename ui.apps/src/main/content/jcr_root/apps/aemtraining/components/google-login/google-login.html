<sly data-sly-use.clientlib="/libs/granite/sightly/templates/clientlib.html">
    <sly data-sly-call="${clientlib.js @ categories='aemtraining.googlelogin'}"></sly>
</sly>

<div class="min-h-screen bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-100 flex items-center justify-center px-4 py-10">
    <div class="w-full max-w-5xl grid grid-cols-1 lg:grid-cols-2 bg-white rounded-3xl shadow-2xl overflow-hidden">

        <!-- Left section -->
        <div class="hidden lg:flex flex-col justify-center bg-gradient-to-br from-indigo-600 via-blue-600 to-cyan-500 text-white p-12">
            <h1 class="text-4xl font-bold leading-tight">Welcome Back</h1>
            <p class="mt-4 text-white/90 text-lg">
                Sign in or create your account to continue. You can also use your Google account for instant access.
            </p>

            <div class="mt-10 space-y-4">
                <div class="bg-white/10 rounded-2xl p-4 backdrop-blur-sm">
                    <h3 class="font-semibold text-lg">Fast Access</h3>
                    <p class="text-sm text-white/85 mt-1">Use Google sign-in for quick login.</p>
                </div>
                <div class="bg-white/10 rounded-2xl p-4 backdrop-blur-sm">
                    <h3 class="font-semibold text-lg">Secure Session</h3>
                    <p class="text-sm text-white/85 mt-1">Your details are verified before access is granted.</p>
                </div>
            </div>
        </div>

        <!-- Right section -->
        <div class="p-8 sm:p-10 lg:p-12">
            <div class="max-w-md mx-auto">
                <div class="text-center lg:text-left">
                    <h2 class="text-3xl font-bold text-slate-900">Login</h2>
                    <p class="text-slate-500 mt-2">Access your account or create a new one</p>
                </div>

                <!-- Tabs -->
                <div class="mt-8 flex rounded-2xl bg-slate-100 p-1">
                    <button id="signInTab"
                            type="button"
                            class="tab-btn flex-1 rounded-xl px-4 py-3 text-sm font-semibold bg-white text-slate-900 shadow-sm">
                        Sign In
                    </button>
                    <button id="signUpTab"
                            type="button"
                            class="tab-btn flex-1 rounded-xl px-4 py-3 text-sm font-semibold text-slate-600">
                        Sign Up
                    </button>
                </div>

                <!-- Sign In Form -->
                <form id="signInForm" class="mt-8 space-y-5">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Email</label>
                        <input type="email"
                               placeholder="Enter your email"
                               class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" />
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Password</label>
                        <input type="password"
                               placeholder="Enter your password"
                               class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" />
                    </div>

                    <button type="button"
                            class="w-full rounded-2xl bg-slate-900 text-white py-3.5 font-semibold hover:opacity-95 transition">
                        Sign In
                    </button>
                </form>

                <!-- Sign Up Form -->
                <form id="signUpForm" class="mt-8 space-y-5 hidden">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Full Name</label>
                        <input type="text"
                               placeholder="Enter your full name"
                               class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" />
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Email</label>
                        <input type="email"
                               placeholder="Enter your email"
                               class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" />
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Password</label>
                        <input type="password"
                               placeholder="Create password"
                               class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" />
                    </div>

                    <button type="button"
                            class="w-full rounded-2xl bg-indigo-600 text-white py-3.5 font-semibold hover:bg-indigo-700 transition">
                        Sign Up
                    </button>
                </form>

                <div class="my-8 flex items-center gap-4">
                    <div class="h-px flex-1 bg-slate-200"></div>
                    <span class="text-sm text-slate-400 font-medium">OR</span>
                    <div class="h-px flex-1 bg-slate-200"></div>
                </div>

                <div class="flex justify-center">
                    <div id="googleSignInBtn"></div>
                </div>

                <p id="googleLoginMessage" class="text-center mt-5 text-sm font-medium"></p>
            </div>
        </div>
    </div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
